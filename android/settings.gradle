pluginManagement {
    def proxySpec = System.getenv("HTTPS_PROXY")
    if (proxySpec == null) {
        proxySpec = System.getenv("https_proxy")
    }
    if (proxySpec == null) {
        proxySpec = System.getenv("HTTP_PROXY")
    }
    if (proxySpec == null) {
        proxySpec = System.getenv("http_proxy")
    }
    if (proxySpec == null) {
        proxySpec = System.getenv("ALL_PROXY")
    }
    if (proxySpec == null) {
        proxySpec = System.getenv("all_proxy")
    }
    if (proxySpec != null && !proxySpec.isBlank()) {
        try {
            def normalizedProxySpec = proxySpec.contains("://") ? proxySpec : "http://${proxySpec}"
            def proxyUri = new java.net.URI(normalizedProxySpec)
            def proxyHost = proxyUri.host
            def proxyPort = proxyUri.port > 0 ? proxyUri.port : (proxyUri.scheme?.toLowerCase()?.startsWith("socks") ? 1080 : 80)
            if (proxyHost != null && !proxyHost.isBlank()) {
                def proxyScheme = proxyUri.scheme?.toLowerCase() ?: "http"
                if (proxyScheme.startsWith("socks")) {
                    System.setProperty("socksProxyHost", proxyHost)
                    System.setProperty("socksProxyPort", proxyPort.toString())
                } else {
                    System.setProperty("http.proxyHost", proxyHost)
                    System.setProperty("http.proxyPort", proxyPort.toString())
                    System.setProperty("https.proxyHost", proxyHost)
                    System.setProperty("https.proxyPort", proxyPort.toString())
                }
            }
        } catch (Exception e) {
            println("Warning: unable to configure Gradle proxy from environment: ${e.message}")
        }
    }

    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    def flutterVersionFile = file("$flutterSdkPath/version")
    if (!flutterVersionFile.exists()) {
        def flutterVersionJson = file("$flutterSdkPath/bin/cache/flutter.version.json")
        if (flutterVersionJson.exists()) {
            try {
                def json = new groovy.json.JsonSlurper().parseText(flutterVersionJson.text)
                def resolvedVersion = json.frameworkVersion ?: json.flutterVersion
                if (resolvedVersion != null) {
                    flutterVersionFile.text = resolvedVersion.toString().trim()
                }
            } catch (Exception e) {
                println("Warning: unable to generate Flutter version file at ${flutterVersionFile.path}: ${e.message}")
            }
        }
    }

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
        maven { url 'https://maven.aliyun.com/repository/google' }
        maven { url 'https://maven.aliyun.com/repository/jcenter' }
        maven { url 'https://maven.aliyun.com/repository/public' }
        maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.9.1" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

include ":app"
